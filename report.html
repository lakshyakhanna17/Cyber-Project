<!DOCTYPE html>
<html lang="en" class="bg-background">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberWeb — Analysis Report</title>
  <meta name="description" content="Detailed threat analysis report with scan, cyber intel and sandbox results." />
  <meta name="theme-color" content="#0a0b0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Scoped to the Sandbox tab's Screenshot Capture panel only. */
    .screenshot-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      padding: 22px;
    }
    .screenshot-card {
      border: 1px solid var(--border, rgba(255, 255, 255, 0.12));
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel-2, #0d1220);
    }
    .screenshot-frame {
      position: relative;
      aspect-ratio: 16 / 10;
      background: var(--panel-2, #0d1220);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .screenshot-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }
    .screenshot-frame::after {
      content: "Screenshot not available";
      display: none;
      color: var(--muted, #8b93ac);
      font-size: 0.8rem;
      text-align: center;
      padding: 0 16px;
    }
    .screenshot-missing .screenshot-frame img { display: none; }
    .screenshot-missing .screenshot-frame::after { display: block; }
    .screenshot-caption {
      padding: 10px 14px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted, #8b93ac);
      border-top: 1px solid var(--border, rgba(255, 255, 255, 0.12));
    }
    @media (max-width: 640px) {
      .screenshot-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body data-page="report">
  <div class="app">
    <aside class="ribbon" id="ribbon"></aside>
    <div class="main">
      <div class="appbar">
        <h1>Analysis Report</h1>
        <div class="actions">
          <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" data-icon="theme"></button>
          <button class="btn btn-sm" id="flag-btn" onclick="flagIt()"><span data-icon="flag"
              style="width:16px;height:16px;display:inline-flex"></span> Flag</button>
          <button class="btn btn-primary btn-sm" onclick="window.print()"><span data-icon="download"
              style="width:16px;height:16px;display:inline-flex"></span> Generate PDF</button>
        </div>
      </div>

      <div class="page-body">
        <!-- URL details + verdict -->
        <div class="panel mb-6">
          <div class="panel-head">
            <div>
              <p class="eyebrow accent" style="margin-bottom:6px">URL Details</p>
              <h3 id="r-host" style="word-break:break-all">—</h3>
            </div>
            <span class="badge" id="r-verdict" style="font-size:0.9rem;padding:8px 16px">—</span>
          </div>
          <div style="padding:22px" class="grid grid-4">
            <div>
              <div class="k" style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)">
                Full URL</div>
              <div id="r-url" style="word-break:break-all">—</div>
            </div>
            <div>
              <div class="k" style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)">
                Scanned</div>
              <div id="r-time">—</div>
            </div>
            <div>
              <div class="k" style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)">
                Risk Score</div>
              <div id="r-risk">—</div>
            </div>
            <div>
              <div class="k" style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)">
                Threats Found</div>
              <div id="r-threatcount">—</div>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <!-- Tabs -->
        <div class="tabs" id="tabs">

          <div class="tab-slider"></div>

          <button class="tab active" onclick="showTab('scan', this)">
            Scan
          </button>

          <button class="tab" onclick="showTab('intel', this)">
            Cyber Intel
          </button>

          <button class="tab" onclick="showTab('sandbox', this)">
            Sandbox
          </button>

        </div>

        <!-- Scan tab -->
        <div class="tab-panel active" id="tab-scan">
          <div class="gauge-wrap mb-6">
            <div class="gauge">
              <h4>Legitimacy Score</h4>
              <div class="ring" id="gauge-legit"></div>
              <p class="muted" id="legit-label">—</p>
            </div>
            <div class="gauge">
              <h4>AI Model Confidence</h4>
              <div class="ring" id="gauge-ai"></div>
              <p class="muted">Verdict certainty</p>
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h3>Detected Threats</h3>
            </div>
            <div id="threat-list"></div>
          </div>
        </div>

        <!-- Intel tab -->
        <div class="tab-panel" id="tab-intel">
          <div class="grid grid-2">
            <div class="panel">
              <div class="panel-head">
                <h3>Domain Intel</h3>
              </div>
              <div id="intel-list"></div>
            </div>
            <div class="panel">
              <div class="panel-head">
                <h3>Reputation</h3>
              </div>
              <div id="rep-list"></div>
            </div>
          </div>
        </div>

        <!-- Sandbox tab -->
        <div class="tab-panel" id="tab-sandbox">
          <div class="panel mb-6">
            <div class="panel-head">
              <h3>Screenshot Capture</h3>
            </div>
            <div class="screenshot-grid" id="screenshot-grid"></div>
          </div>
          <div class="grid grid-2 mb-6">
            <div class="panel">
              <div class="panel-head">
                <h3>Page &amp; TLS Info</h3>
              </div>
              <div id="sandbox-page-list"></div>
            </div>
            <div class="panel">
              <div class="panel-head">
                <h3>Security &amp; Redirects</h3>
              </div>
              <div id="sandbox-security-list"></div>
            </div>
          </div>
          <div class="grid grid-4 mb-6" id="sandbox-stats"></div>
          <div class="panel">
            <div class="panel-head">
              <h3>Behaviour Summary</h3>
            </div>
            <div id="sandbox-notes" style="padding:22px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/mock.js"></script>
  <script>
    // load report or synthesize a demo one
    let report = loadLastReport();
    if (!report) report = generateReport("secure-login-paypa1.com/verify");

    const verdictBadge = { SAFE: "badge-ok", SUSPICIOUS: "badge-warn", MALICIOUS: "badge-danger" };
    const verdictColorVar = { SAFE: "--ok", SUSPICIOUS: "--warn", MALICIOUS: "--danger" };

    // header
    document.getElementById("r-host").textContent = report.host;
    document.getElementById("r-url").textContent = report.url;
    document.getElementById("r-time").textContent = report.scannedAt;
    document.getElementById("r-risk").textContent = report.riskScore + "/100";
    document.getElementById("r-threatcount").textContent = report.detected.length;
    const vb = document.getElementById("r-verdict");
    vb.textContent = report.verdict;
    vb.classList.add(verdictBadge[report.verdict]);

    // ---- gauges ----
    function drawGauge(elId, value, max, colorVar) {
      const el = document.getElementById(elId);
      const pct = value / max;
      const R = 62, C = 2 * Math.PI * R;
      const color = getComputedStyle(document.documentElement).getPropertyValue(colorVar).trim();
      el.innerHTML = `
        <svg viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="${R}" stroke="var(--border)" stroke-width="12" fill="none"/>
          <circle cx="75" cy="75" r="${R}" stroke="${color}" stroke-width="12" fill="none"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}" id="${elId}-arc"/>
        </svg>
        <div class="val">${max === 100 ? value + "%" : value.toFixed(1) + "%"}</div>`;
      // animate
      requestAnimationFrame(() => {
        const arc = document.getElementById(elId + "-arc");
        arc.style.transition = "stroke-dashoffset 1s ease";
        arc.style.strokeDashoffset = C * (1 - pct);
      });
    }

    const legitColor = report.legitimacy >= 70 ? "--ok" : report.legitimacy >= 45 ? "--warn" : "--danger";
    drawGauge("gauge-legit", report.legitimacy, 100, legitColor);
    drawGauge("gauge-ai", report.aiConfidence, 100, "--accent");
    document.getElementById("legit-label").textContent =
      report.legitimacy >= 70 ? "Looks legitimate" : report.legitimacy >= 45 ? "Proceed with caution" : "Likely malicious";

    // threats
    document.getElementById("threat-list").innerHTML = report.detected.length
      ? report.detected
        .map((t) => `<div class="alert-row"><span class="dot dot-danger"></span><span class="url">${t}</span><span class="time">detected</span></div>`)
        .join("")
      : '<div class="alert-row"><span class="dot dot-ok"></span><span class="url">No threats detected</span></div>';

    // intel
    const i = report.intel;
    document.getElementById("intel-list").innerHTML = `
  ${row("Domain name", i.domain)}
  ${row("Domain age", i.age)}
  ${row("Confidence score", i.confidence)}
  ${row("IP address", i.ip)}
  ${row("Threat count", i.threat)}
  ${row("Expiration duration", i.expiration)}`;

    document.getElementById("rep-list").innerHTML = `
  ${row("Brand Similarity", i.brandSimilarity)}
  ${row("Fake Characters", i.fakeCharacters)}
  ${row("URL Shortener Used", i.urlShortener)}
  ${row("Host Reputation", i.reputation)}`;

    function row(k, v) {
      return `<div class="alert-row"><span class="muted">${k}</span><span class="time" style="color:var(--text)">${v}</span></div>`;
    }
    function row(k, v) {
      const safeValues = ["Safe", "No", "Not Detected"];
      const dangerValues = ["Unsafe", "Yes", "Detected"];

      let value;

      if (safeValues.includes(v)) {
        value = `<span class="status-pill status-safe">${v}</span>`;
      } else if (dangerValues.includes(v)) {
        value = `<span class="status-pill status-danger">${v}</span>`;
      } else {
        value = `<span class="time" style="color:var(--text)">${v}</span>`;
      }

      return `
    <div class="alert-row">
      <span class="muted">${k}</span>
      ${value}
    </div>
  `;
    }

    // sandbox
    const s = report.sandbox;

    // Screenshot capture
    const screenshotCard = (label, src) => `
      <div class="screenshot-card">
        <div class="screenshot-frame">
          <img src="${src}" alt="${label}" loading="lazy"
            onerror="this.closest('.screenshot-card').classList.add('screenshot-missing')" />
        </div>
        <div class="screenshot-caption">${label}</div>
      </div>`;
    document.getElementById("screenshot-grid").innerHTML =
      screenshotCard("Homepage Capture", s.screenshots.homepage) +
      screenshotCard("Full Page Capture", s.screenshots.fullpage);

    // Scoped to sandbox only — does not touch the shared row() function
    // used by the Intel tab above.
    function sandboxPill(k, label, danger) {
      return `<div class="alert-row"><span class="muted">${k}</span><span class="status-pill ${danger ? "status-danger" : "status-safe"}">${label}</span></div>`;
    }
    function behaviourRow(label, value, flagged) {
      return flagged ? sandboxPill(label, String(value), true) : row(label, value);
    }

    // Page & TLS info
    document.getElementById("sandbox-page-list").innerHTML = `
      ${row("Page title", s.pageTitle)}
      ${row("Final URL", s.finalUrl)}
      ${row("Page language", s.pageLanguage)}
      ${row("DOM element count", s.domElementCount)}
      ${sandboxPill("Certificate present", s.certificatePresent ? "Present" : "Missing", !s.certificatePresent)}
      ${row("Certificate issuer", s.certificateIssuer ?? "—")}
      ${row("TLS version", s.tlsVersion ?? "—")}
      ${row("Certificate issued", s.certificateIssued ?? "—")}`;

    // Security & redirects
    const sandboxRedirectRows = s.redirects.length
      ? s.redirects.map((r) => row(`Redirect (${r.httpStatusCode})`, r.redirectUrl)).join("")
      : row("Redirects", "None");
    document.getElementById("sandbox-security-list").innerHTML = `
      ${row("Security headers present", s.securityHeadersPresent)}
      ${sandboxPill("Brand impersonation match", s.brandImpersonationMatch ? `${s.brandImpersonationMatch.brand} (${Math.round(s.brandImpersonationMatch.similarity * 100)}%)` : "Not detected", !!s.brandImpersonationMatch)}
      ${sandboxPill("QR code detected", s.qrCodeDetected ? "Detected" : "Not detected", s.qrCodeDetected)}
      ${sandboxPill("Cloaking detected", s.cloakingDetected ? "Detected" : "Not detected", s.cloakingDetected)}
      ${sandboxRedirectRows}`;

    // Stats
    const stats = [
      ["Total Requests", s.totalRequestCount],
      ["Third-Party Domains", s.thirdPartyDomainCount],
      ["Popups", s.popupCount],
      ["Downloads", s.downloads.length],
    ];
    document.getElementById("sandbox-stats").innerHTML = stats
      .map(([k, v]) => `<div class="stat-card"><span class="k">${k}</span><div class="v">${v}</div></div>`)
      .join("");

    // Behaviour summary
    const permissionText = s.permissionRequests.length ? s.permissionRequests.join(", ") : "None";
    let notesHtml = "";
    notesHtml += behaviourRow("XHR Requests", s.xhrRequestCount, s.xhrRequestCount >= 15);
    notesHtml += behaviourRow("WebSocket Connections", s.websocketConnectionCount, s.websocketConnectionCount >= 1);
    notesHtml += behaviourRow("Fingerprinting API Calls", s.fingerprintingApiCount, s.fingerprintingApiCount >= 1);
    notesHtml += behaviourRow("New Tabs Opened", s.newTabCount, s.newTabCount >= 1);
    notesHtml += behaviourRow("Clipboard Read Attempts", s.clipboardReadAttempts, s.clipboardReadAttempts >= 1);
    notesHtml += behaviourRow("Clipboard Write Attempts", s.clipboardWriteAttempts, s.clipboardWriteAttempts >= 1);
    notesHtml += s.permissionRequests.length ? sandboxPill("Permission Requests", permissionText, true) : row("Permission Requests", "None");
    notesHtml += behaviourRow("Password Fields", s.passwordFieldCount, s.passwordFieldCount >= 1);
    notesHtml += behaviourRow("Email Fields", s.emailFieldCount, s.emailFieldCount >= 1);
    notesHtml += behaviourRow("Cross-Domain Forms", s.crossDomainFormCount, s.crossDomainFormCount >= 1);
    notesHtml += behaviourRow("Hidden iFrames", s.hiddenIframeCount, s.hiddenIframeCount >= 1);
    notesHtml += behaviourRow("External Scripts", s.externalScriptCount, s.externalScriptCount >= 6);
    notesHtml += behaviourRow("Base64-Encoded Scripts", s.base64EncodedScriptCount, s.base64EncodedScriptCount >= 1);

    notesHtml += s.evasionTechniques.length
      ? s.evasionTechniques.map((t) => sandboxPill(t.name, t.flagged ? "Flagged" : "Clear", t.flagged)).join("")
      : row("Evasion Techniques", "None checked");

    notesHtml += s.downloads.length
      ? s.downloads.map((d) => sandboxPill(d.fileName, (d.fileSizeBytes / 1024).toFixed(1) + " KB", true)).join("")
      : row("File Downloads", "None");

    notesHtml += sandboxPill("Sandbox Verdict", s.verdict, s.verdict !== "SAFE");

    document.getElementById("sandbox-notes").innerHTML = notesHtml;

    // tabs
    function showTab(tabName, button){
    document.querySelectorAll(".tab").forEach(tab=>{
        tab.classList.remove("active");
    });
    button.classList.add("active");
    moveSlider(button);

    document.querySelectorAll(".tab-panel").forEach(panel=>{
        panel.classList.remove("active");
    });
   document.getElementById("tab-" + tabName).classList.add("active");
}

    function flagIt() {
      const btn = document.getElementById("flag-btn");
      btn.textContent = "✓ Flagged";
      btn.classList.add("btn-primary");
    }
  </script>
</body>

</html>
